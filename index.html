<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicTacToe</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Play Tic, Tac, Toe</h1>
      <h2>Built with HTML, CSS, Java Script and - of course - lots of love!</h2>
    </header>
    <main>
      <section id="user-info-forms">
        <form class="user-info">
          <p class="player-number">Player 1</p>
          <p class="player-name">Player 1</p>
          <p class="player-piece">X</p>
          <button class="edit-player-name-button emptyBtn" type="button">
            Edit
          </button>
        </form>
        <form class="user-info">
          <p class="player-number">Player 2</p>
          <p class="player-name">Player 2</p>
          <p class="player-piece">O</p>
          <button class="edit-player-name-button emptyBtn" type="button">
            Edit
          </button>
        </form>
      </section>
      <section class="module-overlay hidden">
        <div class="user-name-form">
          <h2>Choose your name</h2>
          <label for="player-name-input">Player name</label>
          <input
            type="text"
            name="player-name-input"
            id="player-name-input"
            maxlength="12"
            required
          />
          <div class="user-name-form-button-container">
            <button class="cancel-btn emptyBtn">Cancel</button>
            <button class="confirm-btn fullBtn">Confirm</button>
          </div>
        </div>
      </section>
      <button class="game-start fullBtn">Start New Game</button>
      <section class="game hidden">
        <div class="game-result">
          <p class="game-result-text"></p>
          <p class="hint-after-game">
            Click "Start New Game" above, to start a new game!
          </p>
        </div>
        <p>It's your turn <strong></strong></p>
        <div class="game-field">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </section>
    </main>
  </body>
</html>
